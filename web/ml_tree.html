  .tooltip{background:#252523;border-color:#444441;color:#d3d1c7}
  footer{background:#252523;border-color:#3a3a37;color:#5f5e5a}
}
</style>

<script>
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
const PAL={
  root:  {f:'#D3D1C7',s:'#5F5E5A',t:'#2C2C2A',lk:'#888780'},
  P:     {f:'#EEEDFE',s:'#534AB7',t:'#26215C',lk:'#7F77DD'},
  A:     {f:'#E1F5EE',s:'#1D9E75',t:'#04342C',lk:'#5DCAA5'},
  T:     {f:'#FAEEDA',s:'#854F0B',t:'#412402',lk:'#EF9F27'},
  F:     {f:'#FAECE7',s:'#993C1D',t:'#4A1B0C',lk:'#D85A30'},
};
const DARK={
  root:  {f:'#3a3a37',s:'#B4B2A9',t:'#D3D1C7',lk:'#888780'},
  P:     {f:'#26215C',s:'#7F77DD',t:'#CECBF6',lk:'#7F77DD'},
  A:     {f:'#04342C',s:'#5DCAA5',t:'#9FE1CB',lk:'#5DCAA5'},
  T:     {f:'#412402',s:'#EF9F27',t:'#FAC775',lk:'#EF9F27'},
  F:     {f:'#4A1B0C',s:'#F0997B',t:'#F5C4B3',lk:'#D85A30'},
};
function c(k){return dark?(DARK[k]||DARK.root):(PAL[k]||PAL.root)}

const raw={n:'Machine Learning',k:'root',o:true,ch:[
  {n:'1 · Learning Paradigms',k:'P',o:true,ch:[
    {n:'Supervised',k:'P',d:'Learns from labelled data — every input has a correct output.',ch:[
      {n:'Regression',k:'P',d:'Predicts a continuous numerical value.',ch:[
        {n:'Linear Regression',k:'P',d:'Fits a straight line to minimise squared error.'},
        {n:'Polynomial Regression',k:'P',d:'Extends linear regression with polynomial features.'},
        {n:'Ridge Regression (L2)',k:'P',d:'Linear regression with L2 penalty to prevent overfitting.'},
        {n:'Lasso Regression (L1)',k:'P',d:'Linear regression with L1 penalty; induces sparsity.'},
        {n:'ElasticNet',k:'P',d:'Combines L1 and L2 penalties for a balance of sparsity and stability.'},
        {n:'Support Vector Regression',k:'P',d:'SVR finds a hyperplane within an epsilon margin of training points.'},
      ]},
      {n:'Classification',k:'P',d:'Predicts a discrete category.',ch:[
        {n:'Binary Classification',k:'P',d:'Two classes: yes/no, spam/not-spam.'},
        {n:'Multi-class',k:'P',d:'One of many classes — softmax output.'},
        {n:'Multi-label',k:'P',d:'Multiple tags can be true simultaneously.'},
      ]},
      {n:'Ranking',k:'P',d:'Orders items by relevance.',ch:[
        {n:'Pointwise',k:'P',d:'Treats each item independently, predicts absolute relevance.'},
        {n:'Pairwise',k:'P',d:'Compares pairs of items; trains on which is more relevant.'},
        {n:'Listwise',k:'P',d:'Optimises the full ranked list directly (e.g. LambdaMART).'},
      ]},
    ]},
    {n:'Unsupervised',k:'P',d:'No labels — the model finds structure on its own.',ch:[
      {n:'Clustering',k:'P',d:'Groups similar data points together.',ch:[
        {n:'K-Means',k:'P',d:'Partitions data into K clusters by minimising intra-cluster variance.'},
        {n:'Hierarchical',k:'P',d:'Builds a tree (dendrogram) of cluster merges or splits.',ch:[
          {n:'Agglomerative',k:'P',d:'Bottom-up: start with each point as its own cluster, merge iteratively.'},
          {n:'Divisive',k:'P',d:'Top-down: start with one cluster, recursively split.'},
        ]},
        {n:'DBSCAN',k:'P',d:'Density-based; finds arbitrarily shaped clusters, marks noise.'},
        {n:'HDBSCAN',k:'P',d:'Hierarchical DBSCAN — handles variable density clusters.'},
        {n:'Gaussian Mixture Models',k:'P',d:'Soft clustering via fitted Gaussian distributions (EM algorithm).'},
      ]},
      {n:'Dimensionality Reduction',k:'P',d:'Compresses data while preserving structure.',ch:[
        {n:'PCA',k:'P',d:'Projects data onto principal components of maximum variance.'},
        {n:'t-SNE',k:'P',d:'Non-linear reduction for 2D/3D visualisation; preserves local structure.'},
        {n:'UMAP',k:'P',d:'Faster than t-SNE; preserves both local and global structure.'},
        {n:'LDA',k:'P',d:'Finds axes that maximise class separation.'},
        {n:'ICA',k:'P',d:'Separates mixed signals into independent components.'},
        {n:'Autoencoders',k:'P',d:'Neural encoder-decoder that learns a compressed latent representation.'},
      ]},
      {n:'Generative Modeling',k:'P',d:'Learns to generate new data samples.',ch:[
        {n:'VAE',k:'P',d:'Variational Autoencoder — encodes data as a distribution, samples to generate.'},
        {n:'GAN',k:'P',d:'Generator vs Discriminator trained adversarially to produce realistic outputs.'},
        {n:'Normalizing Flows',k:'P',d:'Invertible transformations that model exact data likelihoods.'},
        {n:'Diffusion Models',k:'P',d:'Learn to reverse a noise-adding process; basis of Stable Diffusion.'},
      ]},
      {n:'Association Rules',k:'P',d:'Finds co-occurrence patterns in transaction data.',ch:[
        {n:'Apriori',k:'P',d:'Iteratively finds frequent itemsets using candidate generation.'},
        {n:'FP-Growth',k:'P',d:'Mines frequent patterns using a compressed FP-tree; faster than Apriori.'},
      ]},
      {n:'Anomaly Detection',k:'P',d:'Flags unusual or outlier data points.',ch:[
        {n:'Isolation Forest',k:'P',d:'Isolates anomalies by randomly partitioning; anomalies have shorter paths.'},
        {n:'One-Class SVM',k:'P',d:'Learns a boundary around normal data; points outside are anomalies.'},
        {n:'Local Outlier Factor',k:'P',d:'Compares local density of a point to its neighbours.'},
        {n:'Autoencoder-based',k:'P',d:'High reconstruction error signals anomaly.'},
      ]},
    ]},
    {n:'Semi-Supervised',k:'P',d:'Small labelled set + large unlabelled set.',ch:[
      {n:'Self-Training',k:'P',d:'Model labels its own confident predictions and retrains on them.'},
      {n:'Co-Training',k:'P',d:'Two models trained on different feature views teach each other.'},
      {n:'Label Propagation',k:'P',d:'Spreads labels through a graph based on similarity.'},
      {n:'Label Spreading',k:'P',d:'Variant of label propagation with additional regularisation.'},
      {n:'Graph-Based Methods',k:'P',d:'Constructs a similarity graph and propagates labels via edges.'},
    ]},
    {n:'Self-Supervised',k:'P',d:'Model generates its own supervision signal from raw data.',ch:[
      {n:'Contrastive Learning',k:'P',d:'Pulls similar samples together, pushes dissimilar apart in embedding space.',ch:[
        {n:'SimCLR',k:'P',d:'Augments two views of the same image; maximises agreement in latent space.'},
        {n:'MoCo',k:'P',d:'Momentum Contrast — uses a queue of negative samples for efficiency.'},
        {n:'CLIP',k:'P',d:'Contrastive Language-Image Pre-training; aligns text and image embeddings.'},
      ]},
      {n:'Masked Prediction',k:'P',d:'Masks part of the input and trains the model to reconstruct it.',ch:[
        {n:'Masked LM (BERT)',k:'P',d:'Randomly masks tokens; model predicts missing words using context.'},
        {n:'Masked Autoencoder',k:'P',d:'Masks image patches; encoder-decoder reconstructs masked regions.'},
      ]},
      {n:'Next Token Prediction',k:'P',d:'Trains on predicting the next token given prior context.',ch:[
        {n:'GPT-style (causal LM)',k:'P',d:'Autoregressive left-to-right prediction; basis of all GPT models.'},
      ]},
    ]},
    {n:'Reinforcement Learning',k:'P',d:'Agent learns by receiving reward/penalty from an environment.',ch:[
      {n:'Model-Free',k:'P',d:'Learns directly from experience without building an env model.',ch:[
        {n:'Value-Based',k:'P',d:'Estimates value of states or actions.',ch:[
          {n:'Q-Learning',k:'P',d:'Off-policy TD learning; updates Q-table from (s,a,r,s\') tuples.'},
          {n:'Deep Q-Network',k:'P',d:'Uses a neural network to approximate Q-values at scale.'},
          {n:'Double DQN',k:'P',d:'Decouples action selection from evaluation to reduce overestimation.'},
          {n:'Dueling DQN',k:'P',d:'Separates value and advantage streams in the Q-network.'},
        ]},
        {n:'Policy-Based',k:'P',d:'Directly optimises the policy function.',ch:[
          {n:'REINFORCE',k:'P',d:'Monte Carlo policy gradient — updates after full episode rollout.'},
          {n:'PPO',k:'P',d:'Proximal Policy Optimization — clips gradient updates for stability.'},
          {n:'TRPO',k:'P',d:'Trust Region Policy Optimization — constrains update step size.'},
        ]},
        {n:'Actor-Critic',k:'P',d:'Combines policy (actor) and value (critic) networks.',ch:[
          {n:'A2C / A3C',k:'P',d:'Advantage Actor-Critic; A3C parallelises across workers.'},
          {n:'SAC',k:'P',d:'Soft Actor-Critic — maximises entropy for exploration + stability.'},
        ]},
      ]},
      {n:'Model-Based',k:'P',d:'Builds an internal model of the environment to plan ahead.',ch:[
        {n:'Dyna-Q',k:'P',d:'Learns a model and uses it to generate synthetic experience.'},
        {n:'AlphaZero',k:'P',d:'Combines MCTS with a neural network; no prior domain knowledge.'},
        {n:'MuZero',k:'P',d:'Extends AlphaZero — learns the model implicitly without knowing env rules.'},
      ]},
      {n:'Inverse RL',k:'P',d:'Infers the reward function from observed expert behaviour.'},
      {n:'Multi-Agent RL',k:'P',d:'Multiple agents learn simultaneously in a shared environment.'},
    ]},
    {n:'Active Learning',k:'P',d:'Model queries a human oracle for labels on the most informative samples.',ch:[
      {n:'Uncertainty Sampling',k:'P',d:'Queries samples the model is least confident about.'},
      {n:'Query by Committee',k:'P',d:'Multiple models vote; queries where they disagree most.'},
      {n:'Expected Model Change',k:'P',d:'Queries samples that would change the model most.'},
    ]},
    {n:'Meta Learning',k:'P',d:'Learning to learn — generalises quickly across tasks from few examples.',ch:[
      {n:'Few-Shot Learning',k:'P',d:'Learns from very few labelled examples per class (e.g. 5-shot).'},
      {n:'Zero-Shot Learning',k:'P',d:'Generalises to unseen classes using semantic descriptions.'},
      {n:'One-Shot Learning',k:'P',d:'Learns from a single example per class.'},
      {n:'MAML',k:'P',d:'Model-Agnostic Meta-Learning — finds initialisations that adapt fast.'},
      {n:'Prototypical Networks',k:'P',d:'Classifies by distance to class prototype embeddings.'},
      {n:'Reptile',k:'P',d:'Simplified MAML — moves model parameters towards task-specific solutions.'},
    ]},
  ]},

  {n:'2 · Model Architectures',k:'A',o:true,ch:[
    {n:'Linear Models',k:'A',d:'Models that make predictions as a linear combination of features.',ch:[
      {n:'Linear Regression',k:'A',d:'Ordinary Least Squares — fits a hyperplane to continuous targets.'},
      {n:'Logistic Regression',k:'A',d:'Linear model with sigmoid output for binary classification.'},
      {n:'SVM',k:'A',d:'Finds the maximum-margin hyperplane; kernels allow non-linear boundaries.',ch:[
        {n:'Linear SVM',k:'A',d:'Hard or soft margin separation with a linear kernel.'},
        {n:'Kernel SVM',k:'A',d:'Maps data to higher dimensions via RBF, polynomial, or custom kernels.'},
        {n:'SVR',k:'A',d:'Support Vector Regression — finds a tube within epsilon of training points.'},
      ]},
      {n:'Perceptron',k:'A',d:'Single-layer binary classifier; earliest neural network unit.'},
    ]},
    {n:'Tree-Based Models',k:'A',d:'Models that make decisions through a hierarchy of feature splits.',ch:[
      {n:'Decision Tree',k:'A',d:'Recursive feature-split tree.',ch:[
        {n:'CART',k:'A',d:'Classification and Regression Trees — uses Gini impurity or MSE.'},
        {n:'ID3',k:'A',d:'Uses information gain to select splits.'},
        {n:'C4.5',k:'A',d:'Extends ID3 with gain ratio, handles continuous features and missing data.'},
      ]},
      {n:'Random Forest',k:'A',d:'Ensemble of decision trees trained on bootstrap samples with random feature subsets.'},
      {n:'Gradient Boosted Trees',k:'A',d:'Sequentially adds trees to correct residual errors.',ch:[
        {n:'Gradient Boosting',k:'A',d:'Fits each new tree to the negative gradient of the loss.'},
        {n:'AdaBoost',k:'A',d:'Reweights misclassified samples; focuses subsequent learners on errors.'},
        {n:'XGBoost',k:'A',d:'Regularised gradient boosting with second-order gradients; very fast.'},
        {n:'LightGBM',k:'A',d:'Histogram-based splits and leaf-wise tree growth; extremely fast on large data.'},
        {n:'CatBoost',k:'A',d:'Handles categorical features natively; symmetric trees; no data leakage.'},
      ]},
      {n:'Extra Trees',k:'A',d:'Like Random Forest but splits are chosen randomly — faster, more variance reduction.'},
    ]},
    {n:'Probabilistic Models',k:'A',d:'Models uncertainty via probability distributions.',ch:[
      {n:'Naive Bayes',k:'A',d:'Applies Bayes theorem with feature independence assumption.'},
      {n:'Gaussian Processes',k:'A',d:'Non-parametric Bayesian model; provides uncertainty estimates.'},
      {n:'Bayesian Networks',k:'A',d:'Directed acyclic graph of conditional probability dependencies.'},
      {n:'Hidden Markov Models',k:'A',d:'Models sequential data with hidden latent states.'},
    ]},
    {n:'Instance-Based Models',k:'A',d:'Predictions based on similarity to stored training examples.',ch:[
      {n:'k-Nearest Neighbors',k:'A',d:'Classifies by majority vote of k closest neighbours in feature space.'},
    ]},
    {n:'Neural Networks',k:'A',d:'Layered compositions of parameterised functions trained via backpropagation.',ch:[
      {n:'Feedforward (MLP)',k:'A',d:'Fully connected layers; universal function approximator.'},
      {n:'CNN',k:'A',d:'Convolutional layers exploit spatial locality and translation invariance.',ch:[
        {n:'LeNet / AlexNet / VGG',k:'A',d:'Classic deep CNNs that defined early image recognition benchmarks.'},
        {n:'ResNet',k:'A',d:'Residual skip connections solve vanishing gradients; enables 100+ layers.'},
        {n:'EfficientNet',k:'A',d:'Compound scaling of depth, width, and resolution simultaneously.'},
        {n:'U-Net',k:'A',d:'Encoder-decoder with skip connections; dominant in medical image segmentation.'},
        {n:'YOLO',k:'A',d:'Single-pass object detection — extremely fast real-time inference.'},
      ]},
      {n:'Recurrent Networks',k:'A',d:'Process sequences by maintaining hidden state across time steps.',ch:[
        {n:'RNN',k:'A',d:'Basic recurrent cell; suffers from vanishing/exploding gradients.'},
        {n:'LSTM',k:'A',d:'Long Short-Term Memory — gating mechanism solves vanishing gradient.'},
        {n:'GRU',k:'A',d:'Gated Recurrent Unit — simpler than LSTM, similar performance.'},
      ]},
      {n:'Transformers',k:'A',d:'Self-attention over all positions in parallel; dominant in NLP and vision.',ch:[
        {n:'Encoder-only (BERT)',k:'A',d:'Bidirectional; suited for classification, NER, QA.'},
        {n:'Decoder-only (GPT)',k:'A',d:'Autoregressive; suited for text generation and LLMs.'},
        {n:'Encoder-Decoder (T5)',k:'A',d:'Sequence-to-sequence tasks: translation, summarisation.'},
        {n:'Vision Transformer (ViT)',k:'A',d:'Applies transformer to image patches; competitive with CNNs.'},
      ]},
      {n:'Graph Neural Networks',k:'A',d:'Operates on graph-structured data.',ch:[
        {n:'GCN',k:'A',d:'Graph Convolutional Network — aggregates neighbour features via convolution.'},
        {n:'GAT',k:'A',d:'Graph Attention Network — learns weighted attention over neighbours.'},
        {n:'GraphSAGE',k:'A',d:'Inductive learning by sampling and aggregating neighbourhood features.'},
      ]},
      {n:'Diffusion Models',k:'A',d:'Learn to reverse a gradual noise-adding process.',ch:[
        {n:'DDPM',k:'A',d:'Denoising Diffusion Probabilistic Models — foundational formulation.'},
        {n:'Stable Diffusion',k:'A',d:'Diffusion in latent space for efficient high-resolution generation.'},
      ]},
      {n:'State Space Models',k:'A',d:'Long-range sequence modelling with linear recurrence.',ch:[
        {n:'Mamba',k:'A',d:'Selective SSM — input-dependent state transitions; linear-time inference.'},
      ]},
    ]},
  ]},

  {n:'3 · Training Strategies',k:'T',o:true,ch:[
    {n:'Ensemble Methods',k:'T',d:'Combines multiple models to reduce error and improve generalisation.',ch:[
      {n:'Bagging',k:'T',d:'Trains models on bootstrap samples in parallel; averages predictions.',ch:[
        {n:'Random Forest',k:'T',d:'Bagging + random feature subsets applied to decision trees.'},
        {n:'Extra Trees',k:'T',d:'Bagging with random splits; lower variance, higher bias than RF.'},
      ]},
      {n:'Boosting',k:'T',d:'Sequentially trains models, each correcting the errors of the previous.',ch:[
        {n:'AdaBoost',k:'T',d:'Reweights misclassified samples after each weak learner.'},
        {n:'Gradient Boosting',k:'T',d:'Fits each learner to the pseudo-residuals of the current ensemble.'},
        {n:'XGBoost',k:'T',d:'Regularised gradient boosting with tree pruning and second-order gradients.'},
        {n:'LightGBM',k:'T',d:'GOSS sampling + EFB bundling make it 10–20× faster than XGBoost on large data.'},
        {n:'CatBoost',k:'T',d:'Ordered boosting prevents target leakage; strong with categorical features.'},
      ]},
      {n:'Stacking',k:'T',d:'Trains a meta-model on the predictions of base models.'},
      {n:'Voting',k:'T',d:'Combines model predictions by majority vote or average probability.',ch:[
        {n:'Hard Voting',k:'T',d:'Takes the class predicted by the majority of models.'},
        {n:'Soft Voting',k:'T',d:'Averages predicted probabilities before taking argmax.'},
      ]},
      {n:'Blending',k:'T',d:'Like stacking but uses a held-out validation set for meta-training.'},
    ]},
    {n:'Transfer Learning',k:'T',d:'Reuses knowledge from one task/domain to accelerate learning on another.',ch:[
      {n:'Feature Extraction',k:'T',d:'Freezes pretrained backbone; trains only a new head on target task.'},
      {n:'Fine-Tuning',k:'T',d:'Continues training all layers on target data with a low learning rate.'},
      {n:'PEFT',k:'T',d:'Parameter-Efficient Fine-Tuning — adapts large models with minimal compute.',ch:[
        {n:'LoRA',k:'T',d:'Low-Rank Adaptation — injects trainable rank-decomposition matrices.'},
        {n:'QLoRA',k:'T',d:'LoRA on 4-bit quantised models; enables fine-tuning on consumer GPUs.'},
        {n:'Adapters',k:'T',d:'Small trainable bottleneck layers inserted between frozen transformer layers.'},
        {n:'Prefix Tuning',k:'T',d:'Prepends trainable soft prompt tokens to each transformer layer.'},
        {n:'Prompt Tuning',k:'T',d:'Learns soft prompts only at the input embedding layer.'},
      ]},
      {n:'Domain Adaptation',k:'T',d:'Bridges distribution shift between source and target domains.'},
    ]},
    {n:'Training Regime',k:'T',d:'Controls when and how data is fed during learning.',ch:[
      {n:'Online Learning',k:'T',d:'Updates model one sample at a time as data arrives; adapts to drift.'},
      {n:'Offline (Batch) Learning',k:'T',d:'Trains on the full dataset at once; stable but not adaptive.'},
      {n:'Mini-Batch Learning',k:'T',d:'Processes fixed-size subsets; balances stability and compute.'},
      {n:'Continual Learning',k:'T',d:'Learns new tasks sequentially without forgetting previous ones.'},
      {n:'Federated Learning',k:'T',d:'Trains across distributed devices without centralising raw data.',ch:[
        {n:'FedAvg',k:'T',d:'Averages local model weights from participating clients.'},
        {n:'Differential Privacy',k:'T',d:'Adds calibrated noise to gradients to protect individual data.'},
      ]},
    ]},
    {n:'Curriculum Learning',k:'T',d:'Trains on easier examples first, progressively increasing difficulty.'},
    {n:'Knowledge Distillation',k:'T',d:'Trains a small student model to mimic the outputs of a large teacher.'},
    {n:'Self-Play',k:'T',d:'Agent improves by playing against past versions of itself (e.g. AlphaGo).'},
    {n:'RLHF',k:'T',d:'Reinforcement Learning from Human Feedback — aligns LLM outputs to preferences.'},
  ]},

  {n:'4 · Foundations',k:'F',o:true,ch:[
    {n:'Data',k:'F',d:'Everything that touches the data before and after modelling.',ch:[
      {n:'EDA',k:'F',d:'Exploratory Data Analysis — understand the data before modelling.',ch:[
        {n:'Descriptive Statistics',k:'F',d:'Mean, median, std, skewness, kurtosis — summarises distributions.'},
        {n:'Distribution Analysis',k:'F',d:'Identifies shape, tails, and modality of feature distributions.'},
        {n:'Correlation Analysis',k:'F',d:'Pearson, Spearman, Kendall — measures pairwise linear/rank relationships.'},
        {n:'Visualisation',k:'F',d:'Charts that reveal patterns, outliers, and relationships.',ch:[
          {n:'Histograms / KDE',k:'F',d:'Shows univariate distribution shape.'},
          {n:'Box plots',k:'F',d:'Shows median, IQR, and outliers.'},
          {n:'Scatter plots',k:'F',d:'Reveals bivariate relationships and clusters.'},
          {n:'Heatmaps',k:'F',d:'Visualises correlation matrices or 2D distributions.'},
          {n:'Pair plots',k:'F',d:'Grid of scatter plots for all feature pairs.'},
          {n:'Violin plots',k:'F',d:'Combines box plot with KDE for richer distribution view.'},
        ]},
        {n:'Outlier Detection',k:'F',d:'IQR method, Z-score, visual inspection to find anomalous values.'},
        {n:'Missing Value Analysis',k:'F',d:'Identifies pattern of missingness (MCAR, MAR, MNAR).'},
        {n:'Cardinality Analysis',k:'F',d:'Checks unique value counts; flags high-cardinality categoricals.'},
      ]},
      {n:'Feature Engineering',k:'F',d:'Creating and transforming features to improve model performance.',ch:[
        {n:'Encoding',k:'F',d:'Converts categorical variables to numeric format.',ch:[
          {n:'One-Hot Encoding',k:'F',d:'Creates binary column per category; risk of high dimensionality.'},
          {n:'Target Encoding',k:'F',d:'Replaces category with target mean; risk of leakage.'},
          {n:'Ordinal Encoding',k:'F',d:'Maps ordered categories to integers.'},
          {n:'Label Encoding',k:'F',d:'Maps each category to an arbitrary integer.'},
          {n:'Frequency Encoding',k:'F',d:'Replaces category with its frequency in the dataset.'},
          {n:'Binary Encoding',k:'F',d:'Encodes category as binary digits; efficient for high cardinality.'},
        ]},
        {n:'Scaling',k:'F',d:'Normalises feature ranges for distance-based and gradient-based models.',ch:[
          {n:'StandardScaler',k:'F',d:'Zero mean, unit variance — best for normally distributed features.'},
          {n:'MinMaxScaler',k:'F',d:'Scales to [0,1] — sensitive to outliers.'},
          {n:'RobustScaler',k:'F',d:'Uses median and IQR — robust to outliers.'},
          {n:'Log Transform',k:'F',d:'Reduces right skew; useful for revenue, counts.'},
        ]},
        {n:'Feature Selection',k:'F',d:'Removes irrelevant or redundant features.',ch:[
          {n:'Filter Methods',k:'F',d:'Variance threshold, chi-squared, mutual information — fast, model-agnostic.'},
          {n:'Wrapper Methods (RFE)',k:'F',d:'Recursively eliminates features using model performance as criterion.'},
          {n:'Embedded Methods',k:'F',d:'Lasso, tree feature importance — selection happens during training.'},
          {n:'Permutation Importance',k:'F',d:'Measures drop in performance when a feature is randomly shuffled.'},
          {n:'SHAP',k:'F',d:'Shapley values — consistent, model-agnostic feature attribution.'},
        ]},
        {n:'Feature Creation',k:'F',d:'Derives new features from existing ones.',ch:[
          {n:'Interaction Features',k:'F',d:'Products or ratios of two features that capture joint effects.'},
          {n:'Polynomial Features',k:'F',d:'x², x³, xy terms to capture non-linear relationships.'},
          {n:'Datetime Features',k:'F',d:'Extracts hour, weekday, month, is_weekend from timestamps.'},
          {n:'Aggregation Features',k:'F',d:'Group-level statistics (mean, max, count) as features.'},
        ]},
      ]},
      {n:'Data Augmentation',k:'F',d:'Artificially expands the training set to improve generalisation.',ch:[
        {n:'Image Augmentation',k:'F',d:'Flips, crops, rotations, colour jitter, cutout, Mixup, CutMix.'},
        {n:'Text Augmentation',k:'F',d:'Synonym replacement, back-translation, random insertion/deletion.'},
        {n:'SMOTE',k:'F',d:'Synthetic Minority Over-sampling Technique — interpolates new minority samples.'},
        {n:'Mixup',k:'F',d:'Trains on convex combinations of pairs of examples and their labels.'},
        {n:'CutMix',k:'F',d:'Cuts and pastes patches between training images; mixes labels proportionally.'},
      ]},
      {n:'Class Imbalance',k:'F',d:'Strategies when one class vastly outnumbers others.',ch:[
        {n:'Oversampling (SMOTE)',k:'F',d:'Generates synthetic minority class samples.'},
        {n:'Undersampling',k:'F',d:'Randomly or strategically removes majority class samples.'},
        {n:'Class Weights',k:'F',d:'Penalises misclassification of minority class more in the loss.'},
        {n:'Threshold Tuning',k:'F',d:'Moves decision threshold to favour minority class recall.'},
      ]},
      {n:'Data Splitting',k:'F',d:'Divides data to avoid leakage and ensure fair evaluation.',ch:[
        {n:'Train / Val / Test Split',k:'F',d:'Standard 70/15/15 or 80/10/10 split.'},
        {n:'Stratified Split',k:'F',d:'Preserves class proportions across splits.'},
        {n:'Time-Series Split',k:'F',d:'Train on past, test on future — never shuffle temporal data.'},
        {n:'Group Split',k:'F',d:'Ensures same entity (patient, user) appears in only one split.'},
      ]},
    ]},
    {n:'Optimization',k:'F',d:'Algorithms that minimise the loss function during training.',ch:[
      {n:'Gradient Descent',k:'F',d:'Iteratively steps in the direction of the negative gradient.',ch:[
        {n:'SGD',k:'F',d:'Stochastic Gradient Descent — updates on single samples; noisy but fast.'},
        {n:'Momentum',k:'F',d:'Accumulates velocity in gradient direction; dampens oscillations.'},
        {n:'Nesterov Momentum',k:'F',d:'Looks ahead before computing gradient; slightly faster than momentum.'},
        {n:'RMSProp',k:'F',d:'Adapts learning rate per parameter using exponential moving average of squared gradients.'},
        {n:'Adam',k:'F',d:'Combines momentum + RMSProp; default choice for most deep learning.'},
        {n:'AdamW',k:'F',d:'Adam with decoupled weight decay; better generalisation than Adam.'},
        {n:'Adagrad',k:'F',d:'Accumulates squared gradients; shrinks LR for frequent features.'},
      ]},
      {n:'LR Schedules',k:'F',d:'Controls how learning rate changes during training.',ch:[
        {n:'Step Decay',k:'F',d:'Reduces LR by a factor every N epochs.'},
        {n:'Cosine Annealing',k:'F',d:'Smoothly decays LR following a cosine curve.'},
        {n:'Warmup',k:'F',d:'Linearly increases LR at the start; prevents early instability.'},
        {n:'Cyclical LR',k:'F',d:'Oscillates LR between min and max; escapes local minima.'},
        {n:'OneCycleLR',k:'F',d:'Single cosine cycle with warmup; fast convergence (super-convergence).'},
      ]},
      {n:'Second-Order Methods',k:'F',d:'Use curvature (Hessian) information for faster convergence.',ch:[
        {n:'L-BFGS',k:'F',d:'Limited-memory quasi-Newton method; excellent for small-batch training.'},
        {n:'Newton\'s Method',k:'F',d:'Uses exact Hessian; too expensive for large neural networks.'},
      ]},
    ]},
    {n:'Regularization',k:'F',d:'Techniques that reduce overfitting by constraining the model.',ch:[
      {n:'L1 (Lasso)',k:'F',d:'Adds |w| penalty; drives irrelevant weights exactly to zero.'},
      {n:'L2 (Ridge / Weight Decay)',k:'F',d:'Adds w² penalty; shrinks weights smoothly without sparsity.'},
      {n:'Dropout',k:'F',d:'Randomly zeroes neurons during training; ensemble effect at test time.'},
      {n:'Batch Normalization',k:'F',d:'Normalises layer inputs per mini-batch; stabilises and accelerates training.'},
      {n:'Layer Normalization',k:'F',d:'Normalises across features (not batch); preferred in transformers.'},
      {n:'Early Stopping',k:'F',d:'Stops training when validation loss stops improving.'},
      {n:'Data Augmentation',k:'F',d:'Acts as regulariser by preventing memorisation of fixed training examples.'},
      {n:'Label Smoothing',k:'F',d:'Softens hard one-hot targets; reduces overconfidence.'},
      {n:'Gradient Clipping',k:'F',d:'Caps gradient norm to prevent exploding gradients in RNNs.'},
    ]},
    {n:'Evaluation',k:'F',d:'Measuring how well a model performs.',ch:[
      {n:'Classification Metrics',k:'F',ch:[
        {n:'Accuracy',k:'F',d:'Fraction correct; misleading on imbalanced datasets.'},
        {n:'Precision',k:'F',d:'Of all positive predictions, how many were correct?'},
        {n:'Recall (Sensitivity)',k:'F',d:'Of all actual positives, how many were found?'},
        {n:'F1 Score',k:'F',d:'Harmonic mean of precision and recall.'},
        {n:'ROC-AUC',k:'F',d:'Area under ROC curve; threshold-invariant measure of separability.'},
        {n:'PR-AUC',k:'F',d:'Area under Precision-Recall curve; better for imbalanced data.'},
        {n:'Confusion Matrix',k:'F',d:'Table of TP, FP, TN, FN counts.'},
        {n:'Log Loss',k:'F',d:'Cross-entropy of predicted probabilities; penalises confident errors.'},
        {n:'Cohen\'s Kappa',k:'F',d:'Measures agreement corrected for chance; good for multi-class.'},
      ]},
      {n:'Regression Metrics',k:'F',ch:[
        {n:'MAE',k:'F',d:'Mean Absolute Error — robust to outliers, interpretable in original units.'},
        {n:'MSE / RMSE',k:'F',d:'Mean Squared Error / Root MSE — penalises large errors more.'},
        {n:'R² Score',k:'F',d:'Proportion of variance explained; 1.0 is perfect, <0 is worse than mean.'},
        {n:'MAPE',k:'F',d:'Mean Absolute Percentage Error — scale-independent but undefined at zero.'},
        {n:'Huber Loss',k:'F',d:'Combines MAE and MSE; robust to outliers with quadratic core.'},
      ]},
      {n:'Ranking Metrics',k:'F',ch:[
        {n:'NDCG',k:'F',d:'Normalised Discounted Cumulative Gain — accounts for position in ranking.'},
        {n:'MAP',k:'F',d:'Mean Average Precision — averages precision at each relevant item.'},
        {n:'MRR',k:'F',d:'Mean Reciprocal Rank — 1/rank of the first relevant result.'},
      ]},
      {n:'Bias-Variance Tradeoff',k:'F',d:'High bias = underfitting; high variance = overfitting. Goal: minimise both.'},
      {n:'Cross-Validation',k:'F',d:'Rigorous model evaluation without leaking test data.',ch:[
        {n:'k-Fold CV',k:'F',d:'Splits data into k folds; trains on k-1, tests on 1, rotates.'},
        {n:'Stratified k-Fold',k:'F',d:'Preserves class distribution in each fold.'},
        {n:'Leave-One-Out CV',k:'F',d:'k=n; expensive but lowest bias for small datasets.'},
        {n:'Time-Series CV',k:'F',d:'Expanding or sliding window; always trains on past, tests on future.'},
        {n:'Nested CV',k:'F',d:'Outer loop for evaluation, inner loop for hyperparameter search.'},
      ]},
    ]},
    {n:'Model Selection',k:'F',d:'Finding the best model and hyperparameters.',ch:[
      {n:'Hyperparameter Tuning',k:'F',ch:[
        {n:'Grid Search',k:'F',d:'Exhaustive search over a defined parameter grid; expensive.'},
        {n:'Random Search',k:'F',d:'Samples random combinations; often finds good solutions faster than grid.'},
        {n:'Bayesian Optimization',k:'F',d:'Builds a surrogate model of the objective; efficient with Optuna or Hyperopt.'},
        {n:'Population-Based Training',k:'F',d:'Evolutionary approach that mutates and selects hyperparameter schedules.'},
        {n:'Successive Halving',k:'F',d:'Allocates more resources to promising configurations progressively.'},
      ]},
      {n:'AutoML',k:'F',d:'Automates model selection and hyperparameter tuning.',ch:[
        {n:'AutoSklearn',k:'F',d:'Bayesian optimisation over sklearn pipeline space.'},
        {n:'TPOT',k:'F',d:'Genetic programming to evolve optimal ML pipelines.'},
        {n:'H2O AutoML',k:'F',d:'Trains and ensembles many models automatically.'},
        {n:'Google AutoML',k:'F',d:'Cloud-based AutoML for vision, NLP, and tabular data.'},
        {n:'AutoGluon',k:'F',d:'Multi-layer stacking with automatic feature engineering by AWS.'},
      ]},
    ]},
  ]},
]};

const W=2400, ROW_H=28, ML=220, MT=16;

function countLeaves(d){
  if(!d.ch||!d.ch.length||d._closed)return 1;
  return d.ch.reduce((s,c)=>s+countLeaves(c),0);
}
function layoutTree(node,x,y){
  const leaves=countLeaves(node);
  node._x=x; node._y=y+(leaves*ROW_H)/2;
  if(!node.ch||!node.ch.length||node._closed){node._y=y+ROW_H/2;return leaves;}
  let cy=y;
  node.ch.forEach(ch=>{const cl=countLeaves(ch);layoutTree(ch,x+ML,cy);cy+=cl*ROW_H;});
  node._y=(node.ch[0]._y+node.ch[node.ch.length-1]._y)/2;
  return leaves;
}
function allNodes(node,arr=[]){arr.push(node);if(node.ch&&!node._closed)node.ch.forEach(c=>allNodes(c,arr));return arr;}
function allLinks(node,arr=[]){if(node.ch&&!node._closed)node.ch.forEach(c=>{arr.push({s:node,t:c});allLinks(c,arr);});return arr;}
function nodeW(d){return Math.max(d.n.length*6.6+28, d._x===0?180:145);}

const svg=d3.select('#ml-svg');
const gLinks=svg.append('g').attr('transform',`translate(24,${MT})`);
const gNodes=svg.append('g').attr('transform',`translate(24,${MT})`);
const tip=document.getElementById('tip');

function render(){
  const leaves=countLeaves(raw);
  const H=leaves*ROW_H+MT*2;
  layoutTree(raw,0,0);
  svg.attr('width',W).attr('height',H);

  const links=allLinks(raw);
  const lSel=gLinks.selectAll('path.link').data(links,d=>d.s.n+'->'+d.t.n);
  lSel.exit().remove();
  lSel.enter().append('path').attr('class','link').merge(lSel)
    .attr('stroke',d=>c(d.t.k).lk)
    .attr('d',d=>{
      const sx=d.s._x+nodeW(d.s),sy=d.s._y,tx=d.t._x,ty=d.t._y,mx=(sx+tx)/2;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
    });

  const nodes=allNodes(raw);
  const nSel=gNodes.selectAll('g.nd-group').data(nodes,d=>d.n);
  nSel.exit().remove();
  const nEnt=nSel.enter().append('g').attr('class','nd-group');
  nEnt.append('rect');nEnt.append('text');nEnt.append('text').attr('class','arr');
  const nAll=nEnt.merge(nSel);

  nAll.attr('transform',d=>`translate(${d._x},${d._y-13})`)
    .on('click',(_,d)=>{
      if(d.ch&&d.ch.length){d._closed=!d._closed;render();}
    })
    .on('mousemove',(e,d)=>{
      if(d.d){
        tip.style.opacity='1';
        tip.style.left=(e.clientX+14)+'px';
        tip.style.top=(e.clientY-10)+'px';
        tip.textContent=d.d;
      }
    })
    .on('mouseleave',()=>tip.style.opacity='0');

  nAll.select('rect')
    .attr('x',0).attr('y',0).attr('width',d=>nodeW(d)).attr('height',26).attr('rx',6)
    .attr('fill',d=>c(d.k).f).attr('stroke',d=>c(d.k).s).attr('stroke-width',.5);

  nAll.select('text:not(.arr)')
    .attr('x',9).attr('y',13).attr('dominant-baseline','central')
    .attr('font-size',11.5).attr('font-weight',d=>d._x<ML*2?500:400)
    .attr('fill',d=>c(d.k).t)
    .text(d=>d.n);

  nAll.select('text.arr')
    .attr('x',d=>nodeW(d)-14).attr('y',13).attr('dominant-baseline','central')
    .attr('font-size',9).attr('fill',d=>c(d.k).s)
    .text(d=>d.ch&&d.ch.length?(d._closed?'▶':'▼'):'');
}

function expandAll(){
  function open(n){n._closed=false;if(n.ch)n.ch.forEach(open);}
  open(raw);render();
}
function collapseToL1(){
  function close(n,d){if(d>0)n._closed=true;if(n.ch)n.ch.forEach(c=>close(c,d+1));}
  close(raw,0);render();
}
function collapseToL2(){
  function close(n,d){if(d>1)n._closed=true;if(n.ch)n.ch.forEach(c=>close(c,d+1));}
  close(raw,0);render();
}

raw._closed=false;
raw.ch.forEach(l1=>{l1._closed=false;if(l1.ch)l1.ch.forEach(l2=>{l2._closed=true;});});
render();
</script>
